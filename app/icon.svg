<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#f0ecfc" stroke="#534ab7" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="5.5" y="5.5" width="21" height="21" rx="4" fill="#eae4f9" stroke="#7f77dd" stroke-width="1"/>
  <!-- Hinges -->
  <rect x="5.5" y="9" width="3" height="5" rx="1" fill="#7f77dd"/>
  <rect x="5.5" y="18" width="3" height="5" rx="1" fill="#7f77dd"/>
  <!-- Bolts -->
  <rect x="23.5" y="11.5" width="2.5" height="4" rx="1" fill="#534ab7"/>
  <rect x="23.5" y="16.5" width="2.5" height="4" rx="1" fill="#534ab7"/>
  <!-- Dial outer -->
  <circle cx="16" cy="16" r="6.5" fill="white" stroke="#534ab7" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="4.5" fill="#eae4f9" stroke="#afa9ec" stroke-width="0.75"/>
  <!-- Pointer -->
  <line x1="16" y1="16" x2="18.5" y2="13.5" stroke="#3c3489" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.25" fill="#534ab7"/>
</svg>
